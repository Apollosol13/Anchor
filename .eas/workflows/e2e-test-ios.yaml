# iOS build + Maestro tests
# Triggered on every pull request to ensure iOS E2E tests are run consistently.

name: e2e-test-ios

on:
  pull_request:
    branches: ["*"]

jobs:
  build_ios_for_e2e:
    type: build
    params:
      platform: ios
      profile: e2e-test # your eas build profile for E2E test

  maestro_test:
    needs: [build_ios_for_e2e]
    type: maestro
    params:
      build_id: ${{ needs.build_ios_for_e2e.outputs.build_id }}
      flow_path: [".maestro/home.yml", ".maestro/expand_test.yml"]
